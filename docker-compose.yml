services:

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:80"
    depends_on:
      - user-service
      - room-service
      - booking-service
      - notification-service
    restart: always


  user-service:
    env_file:
      - ./.env
    build: ./user-service
    container_name: user-service
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/meetingdb
    restart: always

  room-service:
    env_file:
      - ./.env
    build: ./room-service
    container_name: room-service
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/meetingdb
    restart: always

  booking-service:
    env_file:
      - ./.env
    build: ./booking-service
    container_name: booking-service
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/meetingdb
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SECRET_KEY: 9f8a3b1d7c0e2f4a5d6b8c9e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      BOOKING_KAFKA_TOPIC: booking-topic
    restart: always
  notification-service:
    env_file:
      - ./notification-service/.env
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8004:8004"
    depends_on:
      mongo:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BOOKING_KAFKA_TOPIC: booking-topic
    restart: always

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: meetingdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: always

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
    healthcheck:
      #test: ["CMD", "bash", "-c", "nc -z localhost 9092"]
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/9092"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

volumes:
  postgres_data:
  mongo_data: